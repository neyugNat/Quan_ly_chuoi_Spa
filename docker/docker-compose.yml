services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: spa-backend
    environment:
      DATABASE_URL: sqlite:////app/instance/spa.db
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      AUTO_SEED_DEMO: "1"
    ports:
      - "5000:5000"
    volumes:
      - ./data/instance:/app/instance
    command: >
      sh -c "
      mkdir -p /app/instance &&
      python -m flask --app backend.app db upgrade &&
      python -m flask --app backend.app seed &&
      python -m flask --app backend.app run --host 0.0.0.0 --port 5000
      "

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    container_name: spa-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
