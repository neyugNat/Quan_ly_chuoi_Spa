<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng nhập</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              spa: {
                50: '#eef4ff',
                100: '#dce8ff',
                200: '#b9d1ff',
                300: '#90b4ff',
                400: '#6c95f7',
                500: '#4d77dd',
                600: '#3a62c5',
                700: '#2d4f9f',
                800: '#264481',
                900: '#233b6d',
              },
              sage: {
                50: '#edf8f6',
                100: '#d4f0ea',
                200: '#a9e1d7',
                300: '#79ccb8',
                400: '#4ab59a',
                500: '#2f9d84',
                600: '#257f6d',
                700: '#1f6658',
                800: '#1d5348',
                900: '#1a453d',
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-spa-100 via-spa-50 to-sage-50 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <!-- Logo/Brand Section -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-spa-600 to-sage-600 rounded-2xl shadow-lg mb-4">
          <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1-8.313-12.454z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3"/>
          </svg>
        </div>
        <h1 class="text-3xl font-bold text-spa-800 tracking-tight">Quản Lý Chuỗi Spa</h1>
        <p class="text-spa-500 mt-2">Premium Spa Management System</p>
      </div>

      <!-- Login Card -->
      <section class="bg-white rounded-3xl shadow-xl p-8 border border-spa-100">
        <h2 class="text-2xl font-semibold text-spa-800 text-center mb-6">Đăng nhập hệ thống</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="mb-4 px-4 py-3 rounded-xl text-sm {% if category == 'error' %}bg-red-50 border border-red-200 text-red-700{% else %}bg-sage-50 border border-sage-200 text-sage-700{% endif %}">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="post" class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-spa-700 mb-2">Tài khoản</label>
            <input type="text" name="username" placeholder="Nhập tên đăng nhập" required
              class="w-full px-4 py-3 rounded-xl border border-spa-200 focus:border-spa-400 focus:ring-4 focus:ring-spa-100 outline-none transition-all text-spa-800 placeholder-spa-400">
          </div>
          <div>
            <label class="block text-sm font-medium text-spa-700 mb-2">Mật khẩu</label>
            <input type="password" name="password" placeholder="Nhập mật khẩu" required
              class="w-full px-4 py-3 rounded-xl border border-spa-200 focus:border-spa-400 focus:ring-4 focus:ring-spa-100 outline-none transition-all text-spa-800 placeholder-spa-400">
          </div>
          <button type="submit"
            class="w-full bg-gradient-to-r from-spa-600 to-sage-600 text-white py-3.5 rounded-xl font-semibold hover:from-spa-700 hover:to-sage-700 transition-all duration-300 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
            Đăng nhập
          </button>
        </form>
      </section>

    </div>
  </body>
</html>
