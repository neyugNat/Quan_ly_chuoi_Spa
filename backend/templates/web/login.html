<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="{{ url_for('web.static', filename='style.css') }}">
  </head>
  <body>
    <div class="login-wrap">
      <section class="login-card">
        <h2>Đăng nhập hệ thống</h2>
        <p class="muted">Tài khoản demo: admin/admin123 hoặc manager/manager123</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="post">
          <p><input type="text" name="username" placeholder="Tài khoản" required></p>
          <p><input type="password" name="password" placeholder="Mật khẩu" required></p>
          <button type="submit">Đăng nhập</button>
        </form>
      </section>
    </div>
  </body>
</html>
